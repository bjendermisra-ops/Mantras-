<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISKCON Complete Mantra System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="devotionalCanvas"></canvas>

    <nav class="navbar navbar-expand-lg navbar-dark bg-saffron sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#"><i class="fa-solid fa-om"></i> ISKCON Mantras</a>
            <div class="d-flex align-items-center">
                <i class="fa-solid fa-language text-white me-2 fs-4"></i>
                <select id="langSelector" class="form-select form-select-sm shadow-sm fw-bold">
                    <option value="en">English</option>
                    <option value="hi" selected>हिंदी (Hindi)</option>
                    <option value="mr">मराठी (Marathi)</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- 🛠️ FIXED: text-white की जगह text-dark और text-saffron कर दिया है -->
    <header class="text-center py-5 position-relative header-content">
        <h1 class="fw-bold display-4 text-saffron" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">Mantra Knowledge System</h1>
        <p class="lead fw-bold text-dark" id="headerSubtext">सम्पूर्ण गौड़ीय वैष्णव मंत्र</p>
        
        <div class="container mt-4">
            <div class="row justify-content-center g-3">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group input-group-lg shadow-sm border border-warning rounded">
                        <span class="input-group-text bg-white text-saffron border-0"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" id="searchInput" class="form-control border-0 fw-bold text-dark" placeholder="मंत्र खोजें (उदा. हरे कृष्ण)...">
                    </div>
                </div>
            </div>
            <div class="row justify-content-center mt-3">
                <div class="col-md-8 col-lg-6">
                    <select id="categoryFilter" class="form-select form-select-lg shadow-sm border border-warning text-center fw-bold text-saffron">
                        <option value="ALL">All Categories / सभी श्रेणियाँ</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="container my-5 position-relative z-index-1">
        <div class="row g-4" id="mantraContainer"></div>
    </main>

    <div class="modal fade" id="mantraModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen-md-down modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content devotional-border">
                <div class="modal-header bg-saffron text-white">
                    <h5 class="modal-title fw-bold fs-4" id="modalTitle">Mantra Title</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-md-5 p-3">
                    <span class="badge bg-warning text-dark mb-4 px-3 py-2 fs-6 rounded-pill shadow-sm" id="modalCategory">Category</span>
                    <div class="sanskrit-text text-danger mb-4 fw-bold" id="modalSanskrit"></div>
                    <hr class="text-muted w-50 mx-auto">
                    <div class="translation-text text-dark mb-4 fw-semibold" id="modalTranslation"></div>
                    <div class="meaning-box bg-white p-4 rounded-4 shadow-sm border-start border-warning border-4 text-start mt-4">
                        <h5 class="fw-bold text-saffron mb-3"><i class="fa-solid fa-book-open"></i> <span id="meaningLabel">अर्थ (Meaning)</span>:</h5>
                        <p class="mb-0 text-secondary fs-6 lh-lg" id="modalMeaning">Meaning text</p>
                    </div>
                    <div class="mt-5 audio-player p-3 bg-light rounded-pill d-inline-block shadow-sm border">
                        <button class="btn btn-danger rounded-circle shadow" id="playAudioBtn" style="width: 50px; height: 50px;">
                            <i class="fa-solid fa-play fs-5"></i>
                        </button>
                        <span class="ms-3 text-dark fs-5 fw-bold" id="audioLabel">ऑडियो सुनें</span>
                    </div>
                </div>
                <div class="modal-footer justify-content-center bg-light">
                    <button type="button" class="btn btn-outline-dark px-4 fw-bold rounded-pill" id="copyBtn"><i class="fa-regular fa-copy"></i> Copy</button>
                    <button type="button" class="btn btn-success px-4 fw-bold rounded-pill shadow-sm" id="shareBtn"><i class="fa-brands fa-whatsapp"></i> Share</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="database.js"></script> 
    <script src="app.js"></script>    
</body>
</html>
